version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mantraone_postgres
    environment:
      POSTGRES_DB: mantraone_dev
      POSTGRES_USER: mantraone
      POSTGRES_PASSWORD: mantraone_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantraone -d mantraone_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mantraone_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mantraone_api
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /tmp/mantraone_storage:/tmp/mantraone_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: mantraone_worker
    env_file:
      - .env.local
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
